{% extends "base.html" %}

{% block content %}
<section class="auth-container">
    <div class="auth-card glass">
        <div class="auth-header">
            <h1>Reset Password</h1>
            <p>This simulates a secure reset flow for local project use.</p>
        </div>

        <form method="POST" class="form" onsubmit="return validateReset()">
            <label>Registered Email</label>
            <input type="email" name="email" id="resetEmail" placeholder="Enter registered email">

            <label>New Password</label>
            <input type="password" name="new_password" id="resetPassword" placeholder="Minimum 6 characters">

            <button class="primary-btn" type="submit">Reset Password</button>
        </form>

        <div class="auth-links">
            <a href="{{ url_for('main.login') }}">Back to Login</a>
        </div>
    </div>
</section>
{% endblock %}
