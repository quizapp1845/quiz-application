{% extends "base.html" %} {% block content %}
<div class="auth-container">
  <div class="auth-card glass">
    <h2 style="text-align: center">🏆 Leaderboard</h2>

    <input
      type="text"
      id="searchInput"
      placeholder="Search user..."
      style="
        width: 100%;
        padding: 10px;
        margin: 15px 0;
        border-radius: 8px;
        border: none;
      "
    />

    <table
      id="leaderboardTable"
      style="
        width: 100%;
        margin-top: 20px;
        border-collapse: collapse;
        text-align: center;
      "
    >
      <tr style="background: rgba(255, 255, 255, 0.1)">
        <th style="padding: 10px">Rank</th>
        <th>User</th>
        <th>Score</th>
      </tr>

      {% for user in users %}
      <tr style="border-bottom: 1px solid rgba(255, 255, 255, 0.1)">
        <td style="padding: 10px">{{ loop.index }}</td>
        <td>{{ user.username }}</td>
        <td>{{ user.score }}</td>
      </tr>
      {% endfor %}
    </table>

    <div style="text-align: center; margin-top: 20px">
      <a href="/dashboard">
        <button class="primary-btn">⬅ Back</button>
      </a>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  document.addEventListener("DOMContentLoaded", function () {
    document
      .getElementById("searchInput")
      .addEventListener("keyup", function () {
        let value = this.value.toLowerCase();
        let rows = document.querySelectorAll("#leaderboardTable tr");

        rows.forEach((row, index) => {
          if (index === 0) return;

          let username = row.children[1].textContent.toLowerCase();

          row.style.display = username.includes(value) ? "" : "none";
        });
      });
  });
</script>
{% endblock %}
