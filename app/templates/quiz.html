{% extends "base.html" %} {% block content %}
<section class="quiz-page glass">
  <div class="quiz-top">
    <div>
      <p class="eyebrow">Category</p>
      <h1>{{ category }}</h1>
    </div>
    <div class="timer-box">
      <span>Time Left</span>
      <strong id="timer">05:00</strong>
    </div>
  </div>

  <div class="progress-track">
    <div id="quizProgress" class="progress-fill"></div>
  </div>

  <div id="questionBox" class="question-box">
    <div class="skeleton"></div>
  </div>

  <div class="quiz-actions">
    <button class="secondary-btn" id="prevBtn">Previous</button>
    <button class="secondary-btn" id="nextBtn">Next</button>
    <button class="primary-btn" id="submitBtn">Submit Quiz</button>
  </div>
</section>
{% endblock %} {% block scripts %}
<script>
  window.QUIZ_CATEGORY = "{{ category }}";

  let timeLeft = 300; // 5 minutes
  let timer = document.getElementById("timer");

  let countdown = setInterval(() => {
    let minutes = Math.floor(timeLeft / 60);
    let seconds = timeLeft % 60;

    timer.innerText =
      String(minutes).padStart(2, "0") + ":" + String(seconds).padStart(2, "0");

    timeLeft--;

    if (timeLeft < 0) {
      clearInterval(countdown);
      alert("Time up! Auto submitting quiz...");
      submitQuiz();
    }

    if (timeLeft <= 10) {
      timer.style.color = "red";
    }
  }, 1000);
</script>
<script src="{{ url_for('static', filename='js/quiz.js') }}"></script>
{% endblock %}
